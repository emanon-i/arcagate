[package]
name = "arcagate"
version = "0.1.0"
description = "A personal control panel for launching apps, URLs, scripts, and more"
authors = ["you"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "arcagate_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.0", features = [] }
tauri-plugin-log = "2"
rusqlite = { version = "0.34", features = ["bundled"] }
rusqlite_migration = "2"
uuid = { version = "1", features = ["v7"] }
thiserror = "2"
argon2 = "0.5"
