# pre-commit: 整形系 + 軽量 lint で「ローカルで早く気付ける化」
# 注: pre-push hook は worktree + git push + lefthook v2.1.1 の組合せで
# fail 扱いになる既知問題のため一時無効、batch-68 で原因究明・復活予定。
# 当面 svelte-check / cargo test は CI 担保。
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,svelte,js,json,jsonc}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    dprint:
      glob: "*.{md,toml}"
      run: pnpm dprint fmt --allow-no-files {staged_files}
      stage_fixed: true
    rustfmt:
      glob: "src-tauri/**/*.rs"
      run: cargo fmt --manifest-path src-tauri/Cargo.toml
      stage_fixed: true
    clippy:
      glob: "src-tauri/**/*.rs"
      run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
    label-audit:
      glob: "*.{svelte,ts,tsx}"
      run: bash scripts/audit-labels.sh {staged_files}
    widget-coverage:
      glob: "{src-tauri/src/models/workspace.rs,src/lib/types/workspace.ts,src/lib/bindings/WidgetType.ts}"
      run: bash scripts/audit-widget-coverage.sh
    hotkey-consistency:
      glob: "{README.md,CLAUDE.md,docs/l1_requirements/**,docs/l2_architecture/**,src/**/*.{svelte,ts},src-tauri/src/models/config.rs}"
      run: bash scripts/audit-hotkey-consistency.sh
    design-tokens:
      glob: "src/**/*.{svelte,css}"
      run: bash scripts/audit-design-tokens.sh
    aria-icon-only:
      glob: "src/lib/**/*.svelte"
      run: bash scripts/audit-aria-icon-only-buttons.sh
    keyboard-traps:
      # R8-4 G1: <div|span onclick> で role/tabindex なし、<a> で href/role/onclick なし → keyboard 到達不能
      glob: "src/lib/**/*.svelte"
      run: bash scripts/audit-keyboard-traps.sh
    handle-style:
      glob: "src/**/*.{svelte,ts,tsx}"
      run: bash scripts/audit-handle-style.sh
    font-hardcode:
      glob: "src/**/*.{svelte,ts,tsx}"
      run: bash scripts/audit-font-hardcode.sh
    text-overflow:
      glob: "src/**/*.{svelte,ts,tsx}"
      run: bash scripts/audit-text-overflow.sh
    no-horizontal-scrollbar:
      glob: "src/lib/widgets/**/*.{svelte,ts,tsx}"
      run: bash scripts/audit-no-horizontal-scrollbar.sh
    widget-settings-schema:
      # PH-issue-021 retrospective (lessons.md Class B): widget の SettingsContent
      # registry が config schema と一致するか検証 (CommonMaxItemsSettings の誤用検出)。
      glob: "src/lib/widgets/**/*.{svelte,ts}"
      run: bash scripts/audit-widget-settings-schema.sh
    widget-shell:
      # 5/01 user 検収 (ItemWidget 旧形式設定 button): 全 widget が共通 shell パターン
      # (WidgetShell + widgetMenuItems + WidgetSettingsDialog) に従っているか検証。
      glob: "src/lib/widgets/**/*Widget.svelte"
      run: bash scripts/audit-widget-shell.sh
    error-format:
      # audit 2026-05-13 F13: toastStore.add(`...: ${String(e)}`, 'error') を検出。
      # AppError は { code, message } で String(e) だと [object Object]、 getErrorMessage(e) 経由必須。
      glob: "src/**/*.{svelte,ts}"
      run: bash scripts/audit-error-format.sh
    async-commands:
      # W-2 (2026-05-19): heavy I/O (filesystem walk / file open / spawn / HTTP) を行う
      # #[tauri::command] が sync だと main thread を block する (#524 Library freeze 真因)。
      # SYNC_ALLOWED 外の sync command を検出し async + spawn_blocking 化を強制する。
      glob: "src-tauri/src/commands/*.rs"
      run: bash scripts/audit-async-commands.sh
    blocking-on-runtime:
      # PH-PQ-400 T6: command の fn body 内で std::fs / std::process を spawn_blocking
      # の外で直接呼んでいないか検出。 async でも blocking I/O を runtime thread に
      # 残すと freeze するため、 async-commands.sh と相補的に gate する。
      glob: "src-tauri/src/commands/*.rs"
      run: bash scripts/audit-blocking-on-runtime.sh
    personal-data:
      # 個人パス / 実 item 名 / 個人 email が新規 commit に紛れていないか fail-closed で検出。
      # 既存 leak (CLAUDE.md / archive 等) は対象外、 新規追加 line だけを diff-based scan。
      # pattern source: scripts/personal-data-patterns.txt + scripts/.personal-data-patterns.local.txt
      run: bash scripts/audit-personal-data.sh {staged_files}
    stub-action:
      # PH-PQ-500 T6: 空関数 / console のみ / TODO のみの event handler、
      # Default を返すだけの stub command を検出。 「動かないのに UI に出ている」
      # コントロールの再発を gate する。
      run: bash scripts/audit-stub-action.sh
    source-back-link:
      # PH-CF-100: 監視アイテムの逆方向ライフサイクル契約 (item-service spec) を機械検証。
      # 監視自動登録経路で find_by_source / widget_item_hides skip / source 委譲が
      # 入っているか + items table back-link 列の migration 存在を grep でガード。
      glob: "{src-tauri/src/services/item_service.rs,src-tauri/src/repositories/item_repository.rs,src-tauri/migrations/*.sql}"
      run: bash scripts/audit-source-back-link.sh

# pre-push: batch-76 で復活（GIT_* env var 漏出が tempdir tests を破壊する症状を究明 + 修正済）。
# - worktree から push する場合は事前に `bash scripts/setup-worktree.sh` を実行
# - svelte-check + cargo test を並列実行
# - refactor/* branch でも pre-push は走る (CI 側で branch skip するので、ローカル garde-fou は維持)
pre-push:
  parallel: true
  commands:
    svelte-check:
      run: pnpm check
    cargo-test:
      run: cargo test --manifest-path src-tauri/Cargo.toml --quiet
