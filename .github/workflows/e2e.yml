name: E2E

# T1 phase: smoke 5 件を全 PR で実行 (refactor 期間の skip 機構は PR-Z で解除済)。
# T2 / T3 で increment、phase 別 tag 化は規模が増えてから検討。
# 詳細: docs/l1_requirements/test-rebuild/index.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri debug binary
        working-directory: src-tauri
        run: cargo build

      - name: Install Playwright Chromium
        # Codex P1: --with-deps は Linux 用 (apt-get install)。Windows runner では不要。
        run: pnpm exec playwright install chromium

      - name: Run E2E (T1 smoke 5 件)
        run: pnpm test:e2e
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tmp/playwright-report/
          retention-days: 30

      - name: Upload test results (traces, videos, failure screenshots)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
