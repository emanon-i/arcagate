name: E2E

# T1 phase: smoke 5 件を全 PR で実行 (refactor 期間の skip 機構は PR-Z で解除済)。
# T2 / T3 で increment、phase 別 tag 化は規模が増えてから検討。
# 詳細: docs/l1_requirements/test-rebuild/index.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# audit F7 (2026-05-18): 既定 GITHUB_TOKEN を最小権限 (read) に絞る。
permissions:
  contents: read

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri debug binary
        working-directory: src-tauri
        run: cargo build

      - name: Install Playwright Chromium
        # Codex P1: --with-deps は Linux 用 (apt-get install)。Windows runner では不要。
        run: pnpm exec playwright install chromium

      - name: Run E2E (ja locale)
        run: pnpm test:e2e
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      # PH-PQ-700 T7: EN release 検証。 CDP port 9515 / Tauri instance を ja run と
      # 共有するため sequential 実行 (parallel 不可)。 ARCAGATE_E2E_LOCALE=en で
      # globalSetup が英語 UI を強制し、 tests/e2e/locale-en/ の spec (critical-path /
      # a11y / setup-wizard、 axe 含む) を走らせる。
      - name: Run E2E (en locale)
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:en
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515
          ARCAGATE_E2E_LOCALE: en

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            tmp/playwright-report/
            tmp/playwright-report-en/
          retention-days: 30

      - name: Upload test results (traces, videos, failure screenshots)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            test-results/
            test-results-en/
          retention-days: 7
