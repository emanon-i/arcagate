name: E2E

# refactor 期間中、e2e は **manual trigger only** (workflow_dispatch)。
# 自動 push / PR trigger を解除し、CI required check から外す。
# branch protection 側でも `e2e` を required から外すこと (PR description 参照)。
# refactor 完了後、test 再構築 phase で trigger を復活させる。
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri debug binary
        working-directory: src-tauri
        run: cargo build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E core tests (PR — @core only, 5 tests)
        if: github.event_name == 'pull_request'
        run: pnpm test:e2e:core
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      - name: Run full E2E suite (push / workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: pnpm test:e2e
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tmp/playwright-report/
          retention-days: 30

      - name: Upload test results (traces, videos, failure screenshots)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
