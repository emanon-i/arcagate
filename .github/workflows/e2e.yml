name: E2E

# PR-Z: E2E suite は test rebuild plan の T1-T3 phase で再構築予定。
# 当面は no-op stub として残す (branch protection の required check `e2e` を満たすため)。
# T1 完成時に playwright を再導入し、本 stub を実 e2e job に置き換える。
# 詳細: docs/l1_requirements/test-rebuild/index.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: E2E placeholder (T1 phase で再構築予定)
        run: |
          echo "E2E suite was removed in PR-Z (#353)."
          echo "Will be rebuilt in T1 phase per docs/l1_requirements/test-rebuild/index.md"
          echo "This stub satisfies branch protection required check."
