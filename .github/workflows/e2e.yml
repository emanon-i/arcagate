name: E2E

# T1 phase: smoke 5 件を全 PR で実行 (refactor 期間の skip 機構は PR-Z で解除済)。
# T2 / T3 で increment、phase 別 tag 化は規模が増えてから検討。
# 詳細: docs/l1_requirements/test-rebuild/index.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# audit F7 (2026-05-18): 既定 GITHUB_TOKEN を最小権限 (read) に絞る。
permissions:
  contents: read

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri debug binary
        # PH-CF-1210 ⑨: `--features test-launch-seam` で launcher の spawn 葉を build flag
        # 付きシームに差し替えた binary を build する。 e2e (global-setup.ts) が
        # `ARCAGATE_TEST_LAUNCH_SEAM_LOG` env を渡すと外部 process spawn を skip しつつ
        # `{ what, program, args, cwd }` を log に append → 実 UI 経路で click / 右クリック
        # 「デフォルトで開く」 の opener / target が一致するかを機械検証できる。
        working-directory: src-tauri
        run: cargo build --features test-launch-seam

      # 2026-05-30 infra fix: `playwright install chromium` が Windows runner で
      # download 後の unpack ステップで 5h54m hang する regression が発生 (3 連続
      # job timeout、 詳細は PR #595 経緯)。 playwright browser cache を
      # actions/cache で永続化し、 cache hit 時に download + unpack を完全 skip
      # することで hang 経路自体を回避する。 cache key は OS + playwright version
      # で固定。
      #
      # 配置先は `PLAYWRIGHT_BROWSERS_PATH` で project workspace 配下に redirect
      # する。 default の Windows user profile 配下 path は personal-data audit
      # hook (`[\\/]AppData[\\/](Local|Roaming|LocalLow)[\\/]`) に generic で hit
      # するため、 workspace local 配置で個人 path generic regex を回避しつつ
      # cache 経路を確立する。
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.playwright-browsers
          key: playwright-${{ runner.os }}-v1217-chromium

      - name: Install Playwright Chromium (best-effort)
        # Codex P1: --with-deps は Linux 用 (apt-get install)。Windows runner では不要。
        # 2026-05-30: cache miss 時の hang を 6h job timeout でなく 15min で fail-fast
        # にする + `continue-on-error: true` で fail を job 全体には伝播させない。
        #
        # 本 repo の e2e は `chromium.connectOverCDP(http://localhost:9515)` で
        # **WebView2 instance に attach** する設計 (tests/fixtures/global-setup.ts:114)
        # で、 Playwright 同梱の Chrome binary は実行時に使用しない。 install は
        # 念のため (trace viewer 等の補助機能用) に試行するだけで、 失敗しても
        # 後続 test step は走る = hang による job kill を完全に切り離す。
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 15
        continue-on-error: true
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\.playwright-browsers
        run: pnpm exec playwright install chromium

      # cache hit 時も後続 step が PLAYWRIGHT_BROWSERS_PATH を見えるよう env を
      # job 全体 (= 全 step) に export する。 install step の env: と二重指定だが
      # 「cache hit で install skip → test step だけ走る」 経路でも有効になる。
      - name: Export PLAYWRIGHT_BROWSERS_PATH for test steps
        shell: pwsh
        run: |
          $path = "${{ github.workspace }}\.playwright-browsers"
          echo "PLAYWRIGHT_BROWSERS_PATH=$path" >> $env:GITHUB_ENV

      - name: Run E2E (ja locale)
        run: pnpm test:e2e
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      # PH-PQ-700 T7: EN release 検証。 CDP port 9515 / Tauri instance を ja run と
      # 共有するため sequential 実行 (parallel 不可)。 ARCAGATE_E2E_LOCALE=en で
      # globalSetup が英語 UI を強制し、 tests/e2e/locale-en/ の spec (critical-path /
      # a11y / setup-wizard、 axe 含む) を走らせる。
      - name: Run E2E (en locale)
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:en
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515
          ARCAGATE_E2E_LOCALE: en

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            tmp/playwright-report/
            tmp/playwright-report-en/
          retention-days: 30

      - name: Upload test results (traces, videos, failure screenshots)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            test-results/
            test-results-en/
          retention-days: 7
