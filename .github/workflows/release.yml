# Release workflow (PH-447 batch-100 / Distribution Era)
#
# tag push (v*.*.*) でトリガ:
# 1. pnpm tauri build (Windows release バイナリ + msi/nsis bundle)
# 2. (証明書 secret あれば) sign-windows.ps1 で Authenticode 署名
# 3. tauri signer sign で .sig 生成 (updater 用)
# 4. R10-X: cosign keyless で MSI / NSIS / SHA256SUMS.txt に Sigstore bundle 添付
# 5. gh release create + bundle / latest.json / *.sigstore.json 添付
#
# 必要 secret (optional、未設定でも build は通る):
# - WINDOWS_CERTIFICATE: PFX ファイル (base64)
# - WINDOWS_CERTIFICATE_PASSWORD: PFX パスワード
# - TAURI_SIGNING_PRIVATE_KEY: tauri-plugin-updater 署名秘密鍵
# - TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 秘密鍵パスフレーズ
# cosign keyless は GitHub Actions OIDC のみ使用、追加 secret は不要。

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
      # R10-X: cosign keyless signing で OIDC token (job_workflow_ref claim) を Fulcio に提示
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (release)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Authenticode sign (optional)
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = "$env:RUNNER_TEMP/cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $env:ARCAGATE_CERT_FILE = $certPath
          $env:ARCAGATE_CERT_PASSWORD = $env:WINDOWS_CERTIFICATE_PASSWORD
          pwsh scripts/sign-windows.ps1

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (CycloneDX, PH-448)
        shell: powershell
        run: |
          cargo install cargo-cyclonedx --quiet --locked
          pwsh scripts/generate-sbom.ps1 -OutputDir .

      - name: Generate latest.json (Updater feed)
        shell: powershell
        run: |
          $version = "${{ steps.tag.outputs.version }}"
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $sig = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sigContent = if ($sig) { (Get-Content $sig.FullName -Raw).Trim() } else { "" }

          $latest = @{
            version    = $version
            notes      = "Release $version"
            pub_date   = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms  = @{
              "windows-x86_64" = @{
                signature = $sigContent
                url       = "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/$($nsis.Name)"
              }
            }
          } | ConvertTo-Json -Depth 5

          $latest | Out-File -FilePath "latest.json" -Encoding utf8
          Get-Content latest.json

      - name: Generate SHA256 checksums (R6-5)
        shell: bash
        run: |
          msi=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          nsis=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          # release artifact ごとの SHA256 を 1 ファイルに集約 (audit F9 sha256 同梱)
          {
            (cd "$(dirname "$msi")" && sha256sum "$(basename "$msi")")
            (cd "$(dirname "$nsis")" && sha256sum "$(basename "$nsis")")
          } > SHA256SUMS.txt
          echo "===== SHA256SUMS.txt ====="
          cat SHA256SUMS.txt

      # R10-X: cosign keyless signing for distribution attestation (Tier 2、配布元 attestation)。
      # Tier 1 (minisign updater) は user タスク、Tier 2 (cosign) は agent 完全自動。
      # GH Actions OIDC token (job_workflow_ref claim) を Fulcio に提示 → 短期 cert 発行
      # → cosign sign-blob で署名 + Rekor transparency log にエントリ追加 → bundle JSON 生成。
      # ユーザは cosign verify-blob --bundle <file>.sigstore.json で配布元同一性を再現検証可能。
      - name: Install cosign (R10-X、Sigstore keyless)
        uses: sigstore/cosign-installer@v4.1.1

      - name: Cosign sign-blob (MSI / NSIS / SHA256SUMS.txt)
        shell: bash
        run: |
          msi=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          nsis=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          # Sigstore bundle (JSON) を artifact ごとに生成 (cert + sig + Rekor 含む単一ファイル)。
          # --yes は Rekor transparency log への upload 同意プロンプトをスキップ (CI 必須)。
          # COSIGN_EXPERIMENTAL は cosign v2+ で不要。
          for f in "$msi" "$nsis" SHA256SUMS.txt; do
            base=$(basename "$f")
            out="${base}.sigstore.json"
            cosign sign-blob --yes --bundle "$out" "$f"
            echo "signed: $f → $out"
          done
          ls -la *.sigstore.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          msi=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          nsis=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          sbom_args=""
          if [ -f sbom-rust.json ]; then sbom_args="$sbom_args sbom-rust.json"; fi
          if [ -f sbom-npm.json ]; then sbom_args="$sbom_args sbom-npm.json"; fi
          checksum_args=""
          if [ -f SHA256SUMS.txt ]; then checksum_args="SHA256SUMS.txt"; fi
          # R10-X: cosign Sigstore bundle (*.sigstore.json) も同梱
          cosign_args=""
          for sb in *.sigstore.json; do
            if [ -f "$sb" ]; then cosign_args="$cosign_args $sb"; fi
          done
          # release notes は heredoc で file に書き出し → --notes-file で渡す
          # (multi-line --notes "..." を YAML literal block 内で直書きすると、本文中の
          # 行頭が YAML 解釈に合わず workflow validation が 0s fail する。fix forward 2026-05-06)
          # heredoc 区切り 'NOTES' は quoted = 変数展開なし、backtick / backslash を全て literal 保持。
          # ${TAG} / ${REPO} は heredoc 後に sed で代入。
          cat > release-notes.md <<'NOTES'
          Release __TAG__ (auto-generated by .github/workflows/release.yml)

          ## ハッシュ検証

          `SHA256SUMS.txt` をダウンロードして以下で integrity を確認できる:

          ```bash
          sha256sum -c SHA256SUMS.txt
          ```

          ## Cosign keyless 検証 (任意、Tier 2 配布元 attestation)

          各 artifact (`*.msi` / `*.exe` / `SHA256SUMS.txt`) に対応する `<name>.sigstore.json` を同梱。
          [cosign](https://docs.sigstore.dev/cosign/installation/) で配布元 (本リポの release.yml workflow) を再現検証できる:

          ```bash
          cosign verify-blob \
            --bundle <ARTIFACT>.sigstore.json \
            --certificate-identity-regexp "^https://github.com/__REPO__/.github/workflows/release.yml@refs/tags/.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            <ARTIFACT>
          ```

          詳細手順: [cosign-verification.md](https://github.com/__REPO__/blob/main/docs/l1_requirements/distribution/cosign-verification.md)

          ## 配布形態

          - Authenticode 未署名 (SmartScreen 警告は仕様、[SUPPORT.md](https://github.com/__REPO__/blob/main/docs/l1_requirements/distribution/support.md) 参照)
          - minisign updater pubkey (Tier 1) は当面 deferred (manual install のみ、auto-update は無効化扱い)
          - **Cosign keyless (Tier 2)** は本 release から自動有効化、配布元 attestation を提供
          - Windows 11 64-bit のみサポート

          ## DB migration 方針 (audit C6)

          - **forward-only migration** を採用 (rollback は提供されない)。新 release インストール時に DB schema は自動 forward 適用、戻すことはできない
          - 旧 version に戻す必要が生じた場合は `%LOCALAPPDATA%\arcagate\arcagate.db` を退避 → 旧 binary を再インストール → DB を初期化、の手順 (data 喪失あり)
          - backup を強く推奨 (本 app は backup IPC + JSON export を提供、Settings → データ → エクスポート から定期取得可能)

          詳細は [CHANGELOG.md](https://github.com/__REPO__/blob/main/CHANGELOG.md) を参照。
          NOTES
          # leading 10 space (YAML run-block indent 要件) 除去 + placeholder → 値 代入
          sed -i -e 's/^          //' -e "s|__TAG__|${TAG}|g" -e "s|__REPO__|${REPO}|g" release-notes.md
          echo "===== release-notes.md ====="
          cat release-notes.md
          echo "===== release-notes.md ====="
          cat release-notes.md
          gh release create "$TAG" "$msi" "$nsis" latest.json $sbom_args $checksum_args $cosign_args \
            --title "Arcagate $TAG" \
            --notes-file release-notes.md \
            --draft
