name: E2E (nightly full suite)

on:
  schedule:
    - cron: '0 2 * * *' # 毎朝 02:00 UTC (JST 11:00)
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri debug binary
        working-directory: src-tauri
        run: cargo build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run full E2E suite (S + A rank、@perf-nightly 除外)
        run: pnpm test:e2e
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      # R8-1: D7 (1000 item Library) / D8 (100 widget Workspace) fixture-based perf 計測。
      # 失敗しても以降の release build / startup 計測を続行するため continue-on-error。
      - name: Run perf E2E suite (D7 / D8)
        continue-on-error: true
        run: pnpm test:e2e:perf
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      - name: Upload perf measurements (D7 / D8)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-measurements-nightly
          path: docs/l1_requirements/release-readiness/measurements/d*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: tmp/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-nightly
          path: test-results/
          retention-days: 3

      # R7-5: release build + 自動 perf 計測 (D1 cold / D2 warm startup P95)
      - name: Build Tauri release (for perf measurement)
        run: pnpm tauri build

      - name: Measure cold startup P95 (D1)
        shell: pwsh
        continue-on-error: true
        run: pwsh scripts/release-checks/measure-startup.ps1 -Iterations 5 -Cold -OutFile docs/l1_requirements/release-readiness/measurements/startup-cold-nightly.json

      - name: Measure warm startup P95 (D2)
        shell: pwsh
        continue-on-error: true
        run: pwsh scripts/release-checks/measure-startup.ps1 -Iterations 5 -OutFile docs/l1_requirements/release-readiness/measurements/startup-warm-nightly.json

      - name: Upload startup measurements
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: startup-measurements-nightly
          path: docs/l1_requirements/release-readiness/measurements/startup-*.json
          retention-days: 30

      # R8-2: G3 WCAG axe-core measurement (a11y-axe.spec.ts が生成する JSON)。
      # nightly で 30 日保持し、violation 件数の推移を追跡する。
      - name: Upload axe violations artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: axe-violations-nightly
          path: docs/l1_requirements/release-readiness/measurements/axe-violations.json
          retention-days: 30
          if-no-files-found: ignore
