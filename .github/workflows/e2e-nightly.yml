name: E2E (nightly full suite)

on:
  schedule:
    - cron: '0 2 * * *' # 毎朝 02:00 UTC (JST 11:00)
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri debug binary
        working-directory: src-tauri
        run: cargo build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run full E2E suite (S + A rank)
        run: pnpm test:e2e
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9515

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: tmp/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-nightly
          path: test-results/
          retention-days: 3

      # R7-5: release build + 自動 perf 計測 (D1 cold / D2 warm startup P95)
      - name: Build Tauri release (for perf measurement)
        run: pnpm tauri build

      - name: Measure cold startup P95 (D1)
        shell: pwsh
        continue-on-error: true
        run: pwsh scripts/release-checks/measure-startup.ps1 -Iterations 5 -Cold -OutFile docs/l1_requirements/release-readiness/measurements/startup-cold-nightly.json

      - name: Measure warm startup P95 (D2)
        shell: pwsh
        continue-on-error: true
        run: pwsh scripts/release-checks/measure-startup.ps1 -Iterations 5 -OutFile docs/l1_requirements/release-readiness/measurements/startup-warm-nightly.json

      - name: Upload startup measurements
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: startup-measurements-nightly
          path: docs/l1_requirements/release-readiness/measurements/startup-*.json
          retention-days: 30
