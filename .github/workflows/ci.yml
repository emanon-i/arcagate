name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # audit 2026-05-14 CI 短縮 rank 1: Rust incremental + sccache 効果見込み (build cache 改善)。
  # debug build (PR) で incremental 有効化、 cargo build の再 link / 再 compile を最小化。
  CARGO_INCREMENTAL: 1

# audit F7 (2026-05-18): 既定 GITHUB_TOKEN を最小権限 (read) に絞る。
# 個別 job が必要に応じて昇格する (changes job は pull-requests:read を明示済)。
permissions:
  contents: read

jobs:
  # lint + test を 1 job に統合（setup 重複排除、batch-68 PH-295）
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # lint
      - name: Biome check
        run: pnpm biome check

      - name: dprint check
        run: pnpm dprint check

      - name: Label audit (UX 一貫性)
        shell: bash
        run: bash scripts/audit-labels.sh

      - name: Widget coverage audit (Rust enum ↔ TS bindings ↔ WIDGET_LABELS)
        shell: bash
        run: bash scripts/audit-widget-coverage.sh

      - name: Hotkey notation consistency audit
        shell: bash
        run: bash scripts/audit-hotkey-consistency.sh

      - name: Version 3 点同期 audit (PH-454)
        shell: bash
        run: bash scripts/audit-version-sync.sh

      - name: Design token consistency audit
        shell: bash
        run: bash scripts/audit-design-tokens.sh

      - name: Font hardcode audit (PH-issue-007)
        shell: bash
        run: bash scripts/audit-font-hardcode.sh

      - name: Text overflow audit (PH-issue-016)
        shell: bash
        run: bash scripts/audit-text-overflow.sh

      - name: No horizontal scrollbar audit (PH-issue-012)
        shell: bash
        run: bash scripts/audit-no-horizontal-scrollbar.sh

      - name: Widget Settings schema audit (PH-issue-021 retrospective)
        shell: bash
        run: bash scripts/audit-widget-settings-schema.sh

      - name: Widget shell consistency audit (PR #275)
        shell: bash
        run: bash scripts/audit-widget-shell.sh

      - name: A11y icon-only button aria-label audit (R7-2)
        shell: bash
        run: bash scripts/audit-aria-icon-only-buttons.sh

      - name: A11y keyboard reach audit (R8-4 G1)
        shell: bash
        run: bash scripts/audit-keyboard-traps.sh

      - name: i18n hardcode baseline (R7-4、informational only)
        shell: bash
        run: bash scripts/audit-i18n-hardcode.sh

      - name: Release blocker files audit (R4-B)
        shell: bash
        run: bash scripts/release-checks/check-blocker-files.sh

      - name: Frontend error monitor audit (R4-B / B-2)
        shell: bash
        run: bash scripts/release-checks/check-error-monitor.sh

      - name: Updater pubkey audit (R4-B / B-1, deferred)
        shell: bash
        env:
          IS_RELEASE_TAG: 0
        run: bash scripts/release-checks/check-pubkey.sh

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Svelte check
        run: pnpm check

      # PR-Z: refactor 期間終了で test gate skip 解除済。frontend test は全削除 (T1-T4 plan で再構築予定)、
      # Rust inline test (#[cfg(test)]) は migration safety / build correctness のため維持。
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

  # changes: detect whether src code changed (skip build for docs-only PRs)
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            rust:
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # build: PR は debug build のみ（速い）、push / workflow_dispatch は release（リリース確認）
  # docs-only PR は skip
  build:
    needs: [check, changes]
    if: |
      always() &&
      needs.check.result == 'success' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.src == 'true'
      )
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Tauri debug build (PR)
        if: github.event_name == 'pull_request'
        run: pnpm tauri build --debug

      - name: Tauri release build (push / workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: pnpm tauri build
