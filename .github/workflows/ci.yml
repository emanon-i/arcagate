name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # lint + test を 1 job に統合（setup 重複排除、batch-68 PH-295）
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # lint
      - name: Biome check
        run: pnpm biome check

      - name: dprint check
        run: pnpm dprint check

      - name: Label audit (UX 一貫性)
        shell: bash
        run: bash scripts/audit-labels.sh

      - name: Widget coverage audit (Rust enum ↔ TS bindings ↔ WIDGET_LABELS)
        shell: bash
        run: bash scripts/audit-widget-coverage.sh

      - name: Hotkey notation consistency audit
        shell: bash
        run: bash scripts/audit-hotkey-consistency.sh

      - name: Version 3 点同期 audit (PH-454)
        shell: bash
        run: bash scripts/audit-version-sync.sh

      - name: Design token consistency audit
        shell: bash
        run: bash scripts/audit-design-tokens.sh

      - name: Font hardcode audit (PH-issue-007)
        shell: bash
        run: bash scripts/audit-font-hardcode.sh

      - name: Text overflow audit (PH-issue-016)
        shell: bash
        run: bash scripts/audit-text-overflow.sh

      - name: No horizontal scrollbar audit (PH-issue-012)
        shell: bash
        run: bash scripts/audit-no-horizontal-scrollbar.sh

      - name: Widget Settings schema audit (PH-issue-021 retrospective)
        shell: bash
        run: bash scripts/audit-widget-settings-schema.sh

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Svelte check
        run: pnpm check

      # test (lint と同 setup を再利用)
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Vitest (unit tests)
        run: pnpm test

  # changes: detect whether src code changed (skip build for docs-only PRs)
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            rust:
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # build: PR は debug build のみ（速い）、push / workflow_dispatch は release（リリース確認）
  # docs-only PR は skip
  build:
    needs: [check, changes]
    if: |
      always() &&
      needs.check.result == 'success' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.src == 'true'
      )
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Tauri debug build (PR)
        if: github.event_name == 'pull_request'
        run: pnpm tauri build --debug

      - name: Tauri release build (push / workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: pnpm tauri build
